<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Registry</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Stoke:wght@300;400&family=La+Belle+Aurore&family=Crimson+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/pv-project/css/styles.css">
</head>
<body>
  <div class="container">
    <div id="nav-placeholder"></div>
    <div class="pv-app">

      <aside class="sidebar">
        <h2>Patients</h2>
        <ul id="patientList"></ul>
      </aside>

      <main class="content">
        <div class="parchment">
          <div id="patientContent">
            <h1>View Phoenix Vanguard Medical Records</h1>
            <p>Select a patient from the sidebar.</p>
          </div>
        </div>
      </main>

    </div>
  </div>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <!-- Marked -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script src="js/content.js"></script>
  <script src="/pv-project/js/nav.js"></script>

</html>
