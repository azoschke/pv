<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Farm &mdash; Zodiac Weapons Checklist</title>
  <link href="https://fonts.googleapis.com/css2?family=Stoke:wght@300;400&family=La+Belle+Aurore&family=Crimson+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link rel="icon" href="/pv/assets/pdf-emblem-web.png" type="image/png">
  <link rel="stylesheet" href="/pv/css/styles.css">
</head>
<body>
  <div class="container">
    <div id="nav-placeholder"></div>
    <header class="app-header">
      <h1 class="app-title">Trials of the Braves, Book Checklist</h1>
      <p class="app-subtitle">Stage 4 &middot; Animus Zodiac Weapons</p>
    </header>

    <div class="top-controls">
      <div class="job-selector">
        <label for="job-select">Job:</label>
        <select id="job-select"></select>
      </div>
    </div>

    <div class="overall-progress">
      <div class="overall-progress-label">
        <span>Overall Progress</span>
        <span id="overall-progress-text">0 / 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar-fill" id="overall-progress-fill"></div>
      </div>
    </div>

    <div id="books-container"></div>

    <div class="disclaimer">
      FINAL FANTASY is a registered trademark of Square Enix Holdings Co., Ltd.<br>
      FINAL FANTASY XIV &copy; SQUARE ENIX CO., LTD.
    </div>
  </div>

  <script src="/pv/js/nav.js"></script>
  <script src="/pv/zodiac-weapons/books.js"></script>
</body>
</html>
