<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RP Roll Calculator — Phoenix Vanguard</title>

  <link href="https://fonts.googleapis.com/css2?family=Stoke:wght@300;400&family=La+Belle+Aurore&family=Crimson+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <link rel="icon" href="/pv/assets/pdf-emblem-web.png" type="image/png">
  <link rel="stylesheet" href="/pv/css/styles.css">
  <script>(function(){var t=localStorage.getItem('crafting-tools-theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    .rp-tool { max-width: 1100px; margin: 0 auto; padding: 0 0.5rem 3rem; }
    .rp-header { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 0.75rem; margin: 1rem 0 1.25rem; }
    .rp-header h1 { margin: 0; font-family: 'Stoke', serif; }
    .rp-sub { margin: 0.2rem 0 0; color: var(--text-secondary); }
    .rp-me { text-align: right; display: flex; flex-direction: column; }
    .rp-me strong { font-size: 1.05rem; }
    .rp-me span { color: var(--text-secondary); font-size: 0.9rem; }

    .rp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: start; }
    @media (max-width: 860px) { .rp-grid { grid-template-columns: 1fr; } }
    .rp-col { display: flex; flex-direction: column; gap: 1rem; }

    .rp-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 0.6rem; padding: 1rem 1.1rem; }
    .rp-card h3 { margin: 0 0 0.75rem; font-family: 'Stoke', serif; letter-spacing: 0.04em; }

    .rp-input-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.6rem; }
    .rp-input { display: block; width: 100%; margin-top: 0.25rem; padding: 0.5rem 0.6rem; font-size: 1.1rem; font-family: inherit;
      background: var(--bg-card-light); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 0.4rem; box-sizing: border-box; }

    .rp-breakdown { background: var(--bg-darker); border-radius: 0.45rem; padding: 0.6rem 0.75rem; font-size: 0.92rem; }
    .rp-breakdown-output { margin-top: 0.6rem; }
    .rp-bd-row { display: flex; justify-content: space-between; gap: 1rem; padding: 0.15rem 0; }
    .rp-bd-base { color: var(--text-secondary); }
    .rp-bd-rule { height: 1px; background: var(--border-color); margin: 0.4rem 0; }
    .rp-bd-total { font-weight: 700; font-size: 1.02rem; }
    .rp-note { margin: 0.6rem 0 0; font-size: 0.8rem; color: var(--text-secondary); }

    .rp-seg { display: inline-flex; border: 1px solid var(--border-color); border-radius: 0.4rem; overflow: hidden; margin-bottom: 0.75rem; }
    .rp-seg-btn { border: 0; background: var(--bg-card-light); color: var(--text-secondary); padding: 0.35rem 0.8rem; cursor: pointer; font-family: inherit; font-size: 1rem; }
    .rp-seg-btn.is-active { background: var(--accent-brown); color: #fff; }

    .rp-btn { display: inline-block; border: 1px solid var(--accent-brown); background: var(--accent-brown); color: #fff;
      padding: 0.5rem 0.9rem; border-radius: 0.4rem; cursor: pointer; text-decoration: none; font: inherit; }
    .rp-btn.is-small { padding: 0.2rem 0.55rem; font-size: 0.9rem; }
    .rp-btn.is-active { background: var(--accent-gold); border-color: var(--accent-gold); }
    .rp-btn[disabled] { opacity: 0.45; cursor: not-allowed; }
    .rp-link { background: none; border: 0; color: var(--accent-red); cursor: pointer; text-decoration: underline; font: inherit; padding: 0; }

    .rp-item { padding: 0.6rem 0; border-top: 1px solid var(--border-color); }
    .rp-item:first-of-type { border-top: 0; padding-top: 0; }
    .rp-item-img { display: block; width: 100%; max-width: 220px; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 0.4rem; margin-bottom: 0.5rem; }
    .rp-item-name { font-family: 'Stoke', serif; font-size: 1.02rem; }
    .rp-item-flavor { margin: 0.15rem 0 0.4rem; font-style: italic; color: var(--text-secondary); font-size: 0.88rem; white-space: pre-wrap; }
    .rp-ability { border-left: 2px solid var(--border-color); padding: 0.2rem 0 0.2rem 0.6rem; margin: 0.4rem 0; }
    .rp-ability-head { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .rp-ability-desc { font-size: 0.84rem; color: var(--text-primary); margin: 0.15rem 0 0.35rem; white-space: pre-wrap; }
    .rp-mod { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; padding: 0.25rem 0; }
    .rp-mod-info { display: flex; flex-direction: column; }
    .rp-mod-mode { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); border: 1px solid var(--border-color); border-radius: 0.3rem; padding: 0 0.25rem; }
    .rp-mod-meta { font-size: 0.78rem; color: var(--text-secondary); text-transform: capitalize; }
    .rp-mod-control { display: flex; gap: 0.35rem; align-items: center; }

    .rp-dm { border: 1px solid var(--accent-gold); margin-bottom: 1.5rem; }
    .rp-dm-head { display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .rp-dm-head h3 { margin: 0; }
    .rp-dm-turn { display: flex; gap: 0.4rem; align-items: center; }
    .rp-turn-badge { font-size: 0.78rem; padding: 0.15rem 0.5rem; border-radius: 0.3rem; background: var(--bg-darker); }
    .rp-turn-badge.is-locked { background: var(--accent-red); color: #fff; }
    .rp-dm-sub { margin: 0.75rem 0 0.4rem; font-family: 'Stoke', serif; font-size: 0.95rem; }
    .rp-effect { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; padding: 0.35rem 0; border-top: 1px solid var(--border-color); }
    .rp-effect.is-off { opacity: 0.5; }
    .rp-effect-info { display: flex; flex-direction: column; }
    .rp-effect-meta { font-size: 0.78rem; color: var(--text-secondary); text-transform: capitalize; }
    .rp-effect-ctl { display: flex; gap: 0.35rem; align-items: center; }

    .rp-locked { background: rgba(165,77,68,0.12); border: 1px solid var(--accent-red); color: var(--accent-red); }

    .rp-buff-row { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; padding: 0.35rem 0; }
    .rp-buff-label { color: var(--text-secondary); font-size: 0.9rem; }
    .rp-buff-controls { display: flex; gap: 0.4rem; align-items: center; }
    .rp-select { padding: 0.35rem 0.5rem; background: var(--bg-card-light); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 0.4rem; font-family: inherit; font-size: 1rem; }
    .rp-buff-val { width: 4.5rem; padding: 0.35rem 0.5rem; font-size: 1rem; font-family: inherit; background: var(--bg-card-light); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 0.4rem; box-sizing: border-box; }

    .rp-stepper { display: inline-flex; align-items: center; gap: 0.4rem; }
    .rp-step-val { min-width: 3.2rem; text-align: center; font-variant-numeric: tabular-nums; }
    .rp-step-val.is-compact { min-width: 1.4rem; }
    .rp-hp-edit { display: inline-flex; align-items: center; gap: 0.35rem; }
    .rp-hp-edit .material-icons { font-size: 1rem; color: var(--accent-red); }
    .rp-shield-edit { display: inline-flex; align-items: center; gap: 0.35rem; color: var(--text-secondary); }
    .rp-shield-edit.is-on { color: var(--accent-gold); }
    .rp-shield-edit .material-icons { font-size: 1rem; }

    .rp-party { display: flex; flex-direction: column; gap: 0.25rem; }
    .rp-party-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0.4rem; border-radius: 0.4rem; background: var(--bg-card-light); }
    .rp-party-row.is-me { outline: 1px solid var(--accent-brown); }
    .rp-party-row.is-elim { opacity: 0.5; }
    .rp-party-role { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-secondary); }
    .rp-party-stats { display: flex; align-items: center; gap: 0.6rem; margin-left: auto; }
    .rp-shield-tag { display: inline-flex; align-items: center; gap: 0.2rem; color: var(--text-secondary); font-size: 0.85rem; }
    .rp-shield-tag .material-icons { font-size: 1rem; }
    .rp-shield-tag.is-on { color: var(--accent-gold); }
    .rp-elim-tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent-red); }

    .rp-group-banner { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .rp-group-chip { display: inline-flex; align-items: center; gap: 0.4rem; background: var(--bg-darker);
      border: 1px solid var(--accent-gold); border-radius: 2rem; padding: 0.3rem 0.75rem; font-size: 0.88rem; }
    .rp-group-chip .material-icons { font-size: 1rem; color: var(--accent-gold); }
    .rp-chip-x { background: none; border: 0; color: var(--text-secondary); cursor: pointer; font-size: 0.9rem; }
    .rp-active-note { background: var(--bg-darker); border-radius: 0.4rem; padding: 0.5rem 0.75rem; margin-bottom: 1rem; font-size: 0.88rem; }

    .rp-flash { padding: 0.5rem 0.75rem; border-radius: 0.4rem; margin-bottom: 0.75rem; font-size: 0.9rem; }
    .rp-flash.error { background: rgba(165,77,68,0.15); color: var(--accent-red); border: 1px solid var(--accent-red); }

    .rp-gate { max-width: 480px; margin: 4rem auto; text-align: center; background: var(--bg-card);
      border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 2.5rem 2rem; }
    .rp-gate-icon { font-size: 3rem; color: var(--accent-brown); }
    .rp-gate h2 { font-family: 'Stoke', serif; margin: 0.75rem 0 0.5rem; }
    .rp-gate p { color: var(--text-secondary); margin: 0 0 1.25rem; }

    /* Active skills — floating button + popup (player view) */
    .rp-fab { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 60; width: 3.4rem; height: 3.4rem; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; border: 1px solid var(--accent-gold);
      background: var(--accent-brown); color: #fff; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.35); }
    .rp-fab .material-icons { font-size: 1.6rem; }
    .rp-fab-badge { position: absolute; top: -3px; right: -3px; min-width: 1.35rem; height: 1.35rem; padding: 0 0.3rem; box-sizing: border-box;
      display: flex; align-items: center; justify-content: center; border-radius: 0.8rem; background: var(--accent-red); color: #fff;
      font-size: 0.78rem; font-weight: 700; border: 2px solid var(--bg-darker); }
    .rp-fab-backdrop { position: fixed; inset: 0; z-index: 59; background: rgba(0,0,0,0.25); }
    .rp-fab-pop { position: fixed; bottom: 5.4rem; right: 1.5rem; z-index: 60; width: min(360px, 92vw); max-height: 65vh; overflow-y: auto;
      background: var(--bg-card); border: 1px solid var(--accent-gold); border-radius: 0.6rem; padding: 0.9rem 1rem; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .rp-fab-pop-head { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.3rem; }
    .rp-fab-pop-head h3 { margin: 0; font-family: 'Stoke', serif; }
    @media (max-width: 520px) { .rp-fab-pop { left: 1rem; right: 1rem; width: auto; } }
    .rp-skill-group { margin-top: 0.6rem; }
    .rp-skill-group-title { margin: 0 0 0.3rem; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); }
    .rp-skill { border-top: 1px solid var(--border-color); }
    .rp-skill-head { display: flex; align-items: flex-start; gap: 0.5rem; width: 100%; background: none; border: 0; color: var(--text-primary);
      font: inherit; text-align: left; padding: 0.5rem 0; cursor: pointer; }
    .rp-skill-text { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 0.15rem; }
    .rp-skill-name { overflow-wrap: anywhere; }
    .rp-skill-sum { color: var(--text-secondary); font-size: 0.82rem; text-transform: capitalize; overflow-wrap: anywhere; }
    .rp-skill-caret { flex: 0 0 auto; font-size: 1.1rem; color: var(--text-secondary); margin-top: 0.1rem; }
    .rp-skill-body { padding: 0 0 0.55rem 0.1rem; }
    .rp-skill-label { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.15rem; }
    .rp-skill-desc { margin: 0; font-size: 0.85rem; color: var(--text-primary); white-space: pre-wrap; }
    .rp-skill-desc.rp-muted { color: var(--text-secondary); font-style: italic; }

    /* DM session controls + two-column effects / log layout */
    .rp-dm-session { display: flex; gap: 0.4rem; margin: 0.5rem 0 0; flex-wrap: wrap; }
    .rp-btn.is-danger { background: var(--accent-red); border-color: var(--accent-red); }
    .rp-btn.is-ghost { background: none; color: var(--text-primary); }
    .rp-dm-cols { display: grid; grid-template-columns: 1fr minmax(13rem, 19rem); gap: 1.25rem; align-items: start; margin-top: 0.5rem; }
    @media (max-width: 720px) { .rp-dm-cols { grid-template-columns: 1fr; } }
    .rp-dm-log { background: var(--bg-darker); border: 1px solid var(--border-color); border-radius: 0.5rem; padding: 0.5rem 0.7rem; }
    .rp-dm-log .rp-dm-sub { margin-top: 0.1rem; }
    .rp-log-list { display: flex; flex-direction: column; max-height: 18rem; overflow-y: auto; }
    .rp-log { display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; padding: 0.3rem 0; border-top: 1px solid var(--border-color); font-size: 0.82rem; }
    .rp-log:first-child { border-top: 0; }
    .rp-log-main { color: var(--text-primary); }
    .rp-log-delta { font-variant-numeric: tabular-nums; white-space: nowrap; }
    .rp-log-delta.is-up { color: var(--accent-gold); }
    .rp-log-delta.is-down { color: var(--accent-red); }
    .rp-log-delta.rp-log-note { color: var(--text-secondary); white-space: normal; text-align: right; }

    /* Free-typed HP entry */
    .rp-hp-input { width: 3.1rem; padding: 0.2rem 0.3rem; text-align: center; font: inherit; font-variant-numeric: tabular-nums;
      background: var(--bg-card-light); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 0.35rem; }
    .rp-hp-input.is-compact { width: 2.3rem; }
    .rp-hp-max { color: var(--text-secondary); font-size: 0.85rem; }

    /* Battlefield (bosses) */
    .rp-bossbar { display: grid; grid-template-columns: repeat(auto-fit, minmax(15rem, 1fr)); gap: 0.6rem; margin-bottom: 1rem; align-items: start; }
    /* Top-align so a card with a long skill list doesn't vertically center a
       shorter neighbour's content. */
    .rp-boss-card { display: flex; align-items: flex-start; gap: 0.7rem; background: var(--bg-card); border: 1px solid var(--accent-red);
      border-radius: 0.6rem; padding: 0.6rem 0.8rem; }
    .rp-boss-card.is-down { opacity: 0.5; border-color: var(--border-color); }
    .rp-boss-img { width: 3rem; height: 3rem; border-radius: 50%; object-fit: cover; flex: 0 0 auto; border: 1px solid var(--border-color); }
    .rp-boss-info { flex: 1 1 auto; min-width: 0; }
    .rp-boss-name { font-family: 'Stoke', serif; display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap; }
    .rp-boss-down-tag { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary);
      border: 1px solid var(--border-color); border-radius: 0.3rem; padding: 0 0.3rem; }
    .rp-boss-hp { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.3rem; }
    .rp-boss-hp.is-hidden { color: var(--text-secondary); font-size: 0.85rem; gap: 0.35rem; }
    .rp-boss-hp.is-hidden .material-icons { font-size: 1rem; }
    .rp-boss-hp-num { font-variant-numeric: tabular-nums; font-size: 0.85rem; color: var(--text-secondary); white-space: nowrap; }
    /* Revealed skill text under the boss. Uses text-secondary for legible
       contrast on dark backgrounds. */
    .rp-boss-skills { margin-top: 0.35rem; }
    .rp-boss-skills-toggle { background: none; border: 0; padding: 0; cursor: pointer; font: inherit; font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); }
    .rp-boss-tele { font-size: 0.85rem; color: var(--text-secondary); margin: 0.25rem 0 0; line-height: 1.35; }
    .rp-boss-tele strong { font-family: 'Stoke', serif; color: var(--text-secondary); }
    .rp-hpbar { flex: 1 1 auto; height: 0.55rem; background: var(--bg-darker); border-radius: 0.4rem; overflow: hidden; border: 1px solid var(--border-color); }
    .rp-hpbar-fill { height: 100%; background: var(--accent-red); border-radius: 0.4rem; transition: width 0.4s ease; }

    /* Action economy chip + KO banner */
    .rp-action-chip { display: inline-block; margin-top: 0.3rem; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em;
      border-radius: 2rem; padding: 0.12rem 0.6rem; border: 1px solid var(--border-color); align-self: flex-end; }
    .rp-action-chip.is-ready { border-color: var(--accent-gold); color: var(--accent-gold); }
    .rp-action-chip.is-used { color: var(--text-secondary); }
    .rp-action-chip.is-ko { border-color: var(--accent-red); color: var(--accent-red); }
    .rp-ko { background: rgba(165,77,68,0.12); border: 1px solid var(--accent-red); color: var(--accent-red); }
    .rp-me-id { display: flex; align-items: center; gap: 0.45rem; justify-content: flex-end; }

    /* Avatars (roster portraits) — row layout must beat the base .rp-party-id
       column rule above, so flex-direction is set explicitly. */
    .rp-avatar { width: 1.8rem; height: 1.8rem; border-radius: 50%; object-fit: cover; flex: 0 0 auto; border: 1px solid var(--border-color); }
    .rp-avatar-fallback { display: inline-flex; align-items: center; justify-content: center; background: var(--accent-brown); color: #fff;
      font-family: 'Stoke', serif; font-size: 0.82rem; }
    /* Header avatar can stay a touch larger. */
    .rp-me-id .rp-avatar { width: 2rem; height: 2rem; }
    .rp-party-id { display: flex; flex-direction: column; min-width: 0; line-height: 1.15; }
    .rp-party-name { font-size: 0.9rem; overflow-wrap: anywhere; }
    /* Tighter steppers inside the party list so many members stay compact. */
    .rp-party .rp-btn.is-small { padding: 0.05rem 0.42rem; }
    .rp-party .rp-hp-edit, .rp-party .rp-shield-edit { gap: 0.2rem; }
    .rp-party .rp-hp-edit .material-icons, .rp-party .rp-shield-edit .material-icons { font-size: 0.9rem; }
    .rp-party .rp-stepper { gap: 0.2rem; }
    .rp-party .rp-hp-max { font-size: 0.72rem; }
    /* HP value can be 2–3 digits and the number spinner eats width — give it room.
       Shield is single-digit (0–3) so its compact width is left alone. */
    .rp-party .rp-hp-edit .rp-hp-input { width: 3.6rem; }

    /* My Items — mirrors My Profile > My Items: card thumbnails that open a
       detail popup. Reuses .venue-card / .venue-modal / .contrast-border from
       styles.css (which set position:relative + overflow:hidden on the media,
       so the torn border is clipped to the card instead of the whole page).
       Item art is square, unlike the 16:10 venue default. */
    /* My Items sits without the card chrome (per request) but keeps breathing room. */
    .rp-items-panel { padding: 0.25rem 0.25rem 0.5rem; }
    .rp-items-panel > h3 { margin: 0 0 0.75rem; font-family: 'Stoke', serif; letter-spacing: 0.04em; }
    .rp-items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(11rem, 1fr)); gap: 0.9rem; }
    .rp-item-card { cursor: pointer; text-align: left; font: inherit; color: inherit; width: 100%; padding: 0; }
    .rp-item-card .venue-card-media { aspect-ratio: 1 / 1; }
    .rp-item-modal { max-width: 460px; }
    .rp-item-modal .venue-modal-img, .rp-item-modal .contrast-media { aspect-ratio: 1 / 1; }
    .rp-item-abilities { margin-top: 1.1rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .rp-item-ability { padding: 0.7rem 0.75rem; background: var(--bg-card-light); border-radius: 0.4rem; }
    .rp-item-ability > .rp-ability-head strong { font-family: 'Stoke', serif; font-size: 0.98rem; }
    .rp-item-ability-desc { margin: 0.15rem 0 0.4rem; color: var(--text-secondary); white-space: pre-wrap; font-size: 0.88rem; }

    /* DM: per-boss visibility toggle on the battlefield card + multi-target picks */
    .rp-boss-eye { margin-left: auto; align-self: flex-start; background: none; border: 0; cursor: pointer; color: var(--text-secondary); padding: 0.1rem; }
    .rp-boss-eye .material-icons { font-size: 1.05rem; }
    .rp-skill-picks { display: flex; flex-wrap: wrap; gap: 0.3rem 0.7rem; margin: 0.25rem 0 0.35rem; }
    .rp-skill-picks label { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.85rem; cursor: pointer; }
    /* Boss skill = named container (like an item ability) with its effects
       listed below, each fired on its own. */
    .rp-boss-skill { border-top: 1px solid var(--border-color); padding: 0.4rem 0; }
    .rp-boss-skill:first-of-type { border-top: 0; }
    .rp-boss-skill-head { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .rp-boss-skill-head strong { font-family: 'Stoke', serif; }
    .rp-boss-skill-desc { margin: 0.15rem 0 0.3rem; font-size: 0.82rem; color: var(--text-secondary); white-space: pre-wrap; }
    .rp-boss-skill .rp-mod { padding-left: 0.6rem; border-left: 2px solid var(--border-color); margin-top: 0.3rem; }
