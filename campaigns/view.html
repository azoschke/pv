<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaign — Phoenix Vanguard</title>
  <link href="https://fonts.googleapis.com/css2?family=Stoke:wght@300;400&family=La+Belle+Aurore&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="icon" href="/pv/assets/pdf-emblem-web.png" type="image/png">
  <link rel="stylesheet" href="/pv/css/styles.css">
  <script>(function(){var t=localStorage.getItem('crafting-tools-theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
</head>
<body>

  <div class="container">
    <div id="nav-placeholder"></div>

    <header class="app-header">
      <p class="app-subtitle">
        <a href="/pv/campaigns/campaigns.html" class="campaign-back-link">Campaigns</a>
      </p>
      <h1 class="app-title" id="campaign-title">Campaign</h1>
    </header>

    <!-- Two-column layout: sidebar + main -->
    <div class="campaign-layout" id="campaign-layout">

      <!-- Chapter sidebar. Hidden until load decides: single-chapter campaigns
           never reveal it (avoids a flash), multi-chapter campaigns show it once
           the chapter list is ready. -->
      <aside class="campaign-sidebar" id="campaign-sidebar" aria-label="Chapter navigation" style="display:none;">
        <div class="campaign-sidebar-header">
          <span class="campaign-sidebar-title">Chapters</span>
          <button class="campaign-sidebar-close-btn" id="sidebar-close-btn" type="button" aria-label="Close chapter list">&#10005;</button>
        </div>
        <ul class="chapter-list" id="chapter-list" role="list">
          <!-- populated by JS from the campaigns worker -->
        </ul>
      </aside>

      <!-- Main content area -->
      <main class="campaign-main" id="campaign-main">
        <div class="campaign-toolbar" style="display:none;">
          <button class="campaign-sidebar-toggle-btn" id="sidebar-toggle-btn" type="button" aria-label="Toggle chapter list">
            &#9776; Chapters
          </button>
        </div>

        <div id="chapter-content" class="chapter-view">
          <div class="chapter-loading">Loading&hellip;</div>
        </div>
      </main>

    </div><!-- /.campaign-layout -->

    <!-- Mobile overlay -->
    <div class="campaign-overlay" id="campaign-overlay" aria-hidden="true"></div>

    <div class="disclaimer">
      FINAL FANTASY is a registered trademark of Square Enix Holdings Co., Ltd.<br>
      FINAL FANTASY XIV &copy; SQUARE ENIX CO., LTD.
    </div>
  </div><!-- /.container -->

  <!-- Shared markdown utilities, then page logic -->
  <script src="./campaigns.js"></script>
  <script>
  (function () {

    var API_BASE = 'https://pv-campaigns-worker.chlorinatorgreen.workers.dev';

    // Campaign slug comes from ?c=<slug>; the active chapter from ?ch=<slug>.
    // Both live in the URL so every chapter has a permanent, shareable link.
    var params         = new URLSearchParams(window.location.search);
    var campaignSlug   = (params.get('c') || '').trim();

    var campaign      = null;   // { id, slug, name, tag, blurb }
    var chapters      = [];     // [{ id, slug, title, chapter_date, has_tldr }]
    var activeSlug    = null;
    var showingTldr   = false;
    var singleChapter = false;  // hide chapter nav/label when a campaign has one chapter
    var chapterCache  = {};     // chapterSlug -> { main: html, tldr: html|null }

    // DOM refs (resolved after DOMContentLoaded)
    var chapterList   = null;
    var chapterContent = null;
    var sidebarEl     = null;
    var toggleBtn     = null;
    var closeBtn      = null;
    var overlay       = null;

    function isMobile() { return window.innerWidth <= 768; }

    // ── Sidebar open / close (mirrors the legacy per-campaign pages) ─────────
    function openSidebar() {
      if (isMobile()) {
        sidebarEl.classList.add('sidebar-open');
        overlay.classList.add('active');
        overlay.setAttribute('aria-hidden', 'false');
      } else {
        sidebarEl.classList.remove('sidebar-hidden');
        try { localStorage.setItem(sidebarKey(), '0'); } catch (e) {}
      }
    }
    function closeSidebar() {
      if (isMobile()) {
        sidebarEl.classList.remove('sidebar-open');
        overlay.classList.remove('active');
        overlay.setAttribute('aria-hidden', 'true');
      } else {
        sidebarEl.classList.add('sidebar-hidden');
        try { localStorage.setItem(sidebarKey(), '1'); } catch (e) {}
      }
    }
    function toggleSidebar() {
      if (isMobile()) { openSidebar(); return; }
      if (sidebarEl.classList.contains('sidebar-hidden')) openSidebar();
      else closeSidebar();
    }
    function sidebarKey() { return 'campaign-sidebar-hidden:' + campaignSlug; }
    function restoreSidebarState() {
      if (isMobile()) return;
      try { if (localStorage.getItem(sidebarKey()) === '1') sidebarEl.classList.add('sidebar-hidden'); } catch (e) {}
    }

    // ── URL sync ─────────────────────────────────────────────────────────────
    function syncUrl() {
      var qs = '?c=' + encodeURIComponent(campaignSlug);
      if (activeSlug) qs += '&ch=' + encodeURIComponent(activeSlug);
      history.replaceState(null, '', qs);
    }

    // ── Chapter list rendering ────────────────────────────────────────────────
    function buildChapterList() {
      chapterList.innerHTML = '';
      chapters.forEach(function (ch) {
        var li = document.createElement('li');
        li.className = 'chapter-list-item';
        li.dataset.chapterSlug = ch.slug;

        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chapter-list-btn';
        btn.innerHTML =
          '<span class="chapter-list-btn-title">' + escapeHtml(ch.title) + '</span>' +
          '<span class="chapter-list-btn-date">'  + escapeHtml(ch.chapter_date || '') + '</span>';
        btn.addEventListener('click', function () {
          loadChapter(ch.slug);
          if (isMobile()) closeSidebar();
        });

        li.appendChild(btn);
        chapterList.appendChild(li);
      });
    }

    function setActiveChapterItem(slug) {
      chapterList.querySelectorAll('.chapter-list-item').forEach(function (li) {
        li.classList.toggle('active', li.dataset.chapterSlug === slug);
      });
    }

    // ── Chapter loading & rendering ───────────────────────────────────────────
    function loadChapter(slug) {
      if (activeSlug === slug) return;
      activeSlug = slug;
      showingTldr = false;

      setActiveChapterItem(slug);
      syncUrl();

      if (chapterCache[slug]) {
        renderChapter(slug, chapterCache[slug]);
        return;
      }

      chapterContent.innerHTML = '<div class="chapter-loading">Loading&hellip;</div>';

      fetch(API_BASE + '/campaigns/' + encodeURIComponent(campaignSlug) +
            '/chapters/' + encodeURIComponent(slug))
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function (ch) {
          var data = {
            title: ch.title,
            date:  ch.chapter_date || '',
            main:  CampaignUtils.parseMarkdown(ch.body_md || ''),
            tldr:  ch.tldr_md ? CampaignUtils.parseMarkdown(ch.tldr_md) : null
          };
          chapterCache[slug] = data;
          renderChapter(slug, data);
        })
        .catch(function (err) {
          chapterContent.innerHTML = '<div class="chapter-error">Could not load this chapter. Please try again later.</div>';
          console.error('[campaign] chapter load error:', err);
        });
    }

    function renderChapter(slug, data) {
      var hasTldr = !!data.tldr;

      chapterContent.innerHTML =
        '<div class="chapter-view-header">' +
          '<div class="chapter-view-meta">' +
            (singleChapter ? '' : '<p class="chapter-view-label">Chapter</p>') +
            '<h2 class="chapter-view-title">' + escapeHtml(data.title) + '</h2>' +
            '<p class="chapter-view-date">'  + escapeHtml(data.date)  + '</p>' +
          '</div>' +
          (hasTldr
            ? '<button class="tldr-toggle-btn" id="tldr-toggle-btn" type="button" aria-pressed="false">TL;DR</button>'
            : '') +
        '</div>' +
        '<div class="chapter-body" id="chapter-body-main">' + data.main + '</div>' +
        (hasTldr
          ? '<div class="chapter-body chapter-body--tldr" id="chapter-body-tldr" hidden>' + data.tldr + '</div>'
          : '');

      if (hasTldr) {
        document.getElementById('tldr-toggle-btn').addEventListener('click', function () {
          showingTldr = !showingTldr;
          this.classList.toggle('active', showingTldr);
          this.setAttribute('aria-pressed', showingTldr ? 'true' : 'false');
          var mainBody = document.getElementById('chapter-body-main');
          var tldrBody = document.getElementById('chapter-body-tldr');
          if (showingTldr) { mainBody.hidden = true;  tldrBody.removeAttribute('hidden'); }
          else             { mainBody.removeAttribute('hidden'); tldrBody.hidden = true; }
        });
      }
    }

    // ── Utilities ──────────────────────────────────────────────────────────────
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showFatal(msg) {
      chapterContent.innerHTML = '<div class="chapter-error">' + escapeHtml(msg) + '</div>';
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    function init() {
      chapterList    = document.getElementById('chapter-list');
      chapterContent = document.getElementById('chapter-content');
      sidebarEl      = document.getElementById('campaign-sidebar');
      toggleBtn      = document.getElementById('sidebar-toggle-btn');
      closeBtn       = document.getElementById('sidebar-close-btn');
      overlay        = document.getElementById('campaign-overlay');

      toggleBtn.addEventListener('click', toggleSidebar);
      closeBtn.addEventListener('click', closeSidebar);
      overlay.addEventListener('click', closeSidebar);
      restoreSidebarState();

      if (!campaignSlug) {
        showFatal('No campaign specified. Return to the Campaigns page and pick one.');
        return;
      }

      fetch(API_BASE + '/campaigns/' + encodeURIComponent(campaignSlug))
        .then(function (res) {
          if (res.status === 404) throw new Error('not-found');
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function (data) {
          campaign = data;
          chapters = Array.isArray(data.chapters) ? data.chapters : [];

          document.title = campaign.name + ' — Phoenix Vanguard';
          document.getElementById('campaign-title').textContent = campaign.name;

          buildChapterList();

          if (!chapters.length) {
            showFatal('This campaign has no chapters yet.');
            return;
          }

          // The sidebar + toggle start hidden (see markup). Reveal them only for
          // multi-chapter campaigns; single-chapter campaigns (e.g. one-shots)
          // keep them hidden and also drop the "Chapter" label, with no flash.
          singleChapter = chapters.length === 1;
          if (!singleChapter) {
            sidebarEl.style.display = '';
            var toolbar = document.querySelector('.campaign-toolbar');
            if (toolbar) toolbar.style.display = '';
          }

          var wanted = (params.get('ch') || '').trim();
          var target = chapters.find(function (c) { return c.slug === wanted; }) || chapters[0];
          loadChapter(target.slug);
        })
        .catch(function (err) {
          if (err && err.message === 'not-found') {
            showFatal('Campaign not found. It may have been renamed or removed.');
          } else {
            showFatal('Could not load this campaign. Please try again later.');
          }
          console.error('[campaign] load error:', err);
        });
    }

    document.addEventListener('DOMContentLoaded', init);

  })();
  </script>

  <script src="/pv/js/nav.js"></script>
</body>
</html>
