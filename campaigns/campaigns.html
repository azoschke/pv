<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaigns — Phoenix Vanguard Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Stoke:wght@300;400&family=La+Belle+Aurore&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="icon" href="/pv/assets/pdf-emblem-web.png" type="image/png">
  <link rel="stylesheet" href="/pv/css/styles.css">
  <script>(function(){var t=localStorage.getItem('crafting-tools-theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
</head>
<body>

  <div class="container">
    <div id="nav-placeholder"></div>

    <header class="app-header">
      <p class="app-subtitle">Phoenix Vanguard</p>
      <h1 class="app-title">Campaigns</h1>
    </header>

    <p class="landing-intro">
      Session recaps for Phoenix Vanguard campaigns.
      Select a campaign below to browse its chapters.
    </p>

    <div class="landing-grid" id="campaign-landing-grid">
      <div class="chapter-loading" style="grid-column:1/-1;">Loading campaigns&hellip;</div>
    </div>

    <div class="disclaimer">
      FINAL FANTASY is a registered trademark of Square Enix Holdings Co., Ltd.<br>
      FINAL FANTASY XIV &copy; SQUARE ENIX CO., LTD.
    </div>
  </div>

  <script>
  (function () {
    var API_BASE = 'https://pv-campaigns-worker.chlorinatorgreen.workers.dev';
    var grid = document.getElementById('campaign-landing-grid');

    // Tag → the small-caps label shown above each card title.
    var TAG_LABEL = { main: 'Main Campaign', side: 'Side Campaign', oneshot: 'One-Shots' };

    function escapeHtml(str) {
      return String(str == null ? '' : str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function render(campaigns) {
      if (!campaigns.length) {
        grid.innerHTML = '<p class="chapter-loading" style="grid-column:1/-1;">No campaigns yet. Check back soon.</p>';
        return;
      }
      grid.innerHTML = '';
      campaigns.forEach(function (c) {
        var href = '/pv/campaigns/view.html?c=' + encodeURIComponent(c.slug);
        var a = document.createElement('a');
        a.href = href;
        a.className = 'landing-card';
        a.innerHTML =
          '<div class="landing-card-inner">' +
            '<p class="landing-card-subtitle">' + escapeHtml(TAG_LABEL[c.tag] || c.tag) + '</p>' +
            '<h3 class="landing-card-title">' + escapeHtml(c.name) + '</h3>' +
            '<p class="landing-card-desc">' + escapeHtml(c.blurb || '') + '</p>' +
            '<span class="landing-card-cta">Read ' + escapeHtml(c.name) + ' &rarr;</span>' +
          '</div>';
        grid.appendChild(a);
      });
    }

    fetch(API_BASE + '/campaigns')
      .then(function (res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
      .then(function (data) { render(Array.isArray(data) ? data : []); })
      .catch(function (err) {
        grid.innerHTML = '<p class="chapter-error" style="grid-column:1/-1;">Could not load campaigns. Please try again later.</p>';
        console.error('[campaigns] landing load error:', err);
      });
  })();
  </script>

  <script src="/pv/js/nav.js"></script>
</body>
</html>
